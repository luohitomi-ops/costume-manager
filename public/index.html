<script>
function initCustomSelect(root) {
  const trigger = root.querySelector('.cs-trigger');
  const menu = root.querySelector('.cs-menu');
  const hiddenSelect = document.getElementById(root.dataset.target);
  const options = [...root.querySelectorAll('.cs-option')];

  function applyValue(value) {
    const opt = options.find(o => o.dataset.value === value) || options[0];
    hiddenSelect.value = opt.dataset.value;
    trigger.querySelector('.cs-trigger-icon').innerHTML = opt.querySelector('.cs-option-icon').innerHTML;
    trigger.querySelector('.cs-trigger-label').textContent = opt.querySelector('.cs-option-label').textContent;
    options.forEach(o => o.setAttribute('aria-selected', o === opt ? 'true' : 'false'));
  }

  function open() {
    const rect = trigger.getBoundingClientRect();
    menu.style.top = `${rect.bottom + 4}px`;
    menu.style.left = `${rect.left}px`;
    menu.style.width = `${rect.width}px`;
    menu.hidden = false;
    trigger.setAttribute('aria-expanded', 'true');
  }
  function close() { menu.hidden = true; trigger.setAttribute('aria-expanded', 'false'); }

  trigger.addEventListener('click', () => (menu.hidden ? open() : close()));
  options.forEach(opt => {
    opt.addEventListener('click', () => { applyValue(opt.dataset.value); close(); trigger.focus(); });
  });
  document.addEventListener('click', (e) => { if (!root.contains(e.target)) close(); });
  root.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { close(); trigger.focus(); }
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
      e.preventDefault();
      const idx = options.findIndex(o => o.getAttribute('aria-selected') === 'true');
      const next = e.key === 'ArrowDown' ? Math.min(options.length - 1, idx + 1) : Math.max(0, idx - 1);
      applyValue(options[next].dataset.value);
      if (menu.hidden) open();
    }
  });

  applyValue(hiddenSelect.value);
}

let categoryLabels = {};

async function loadCategoryOptions() {
  const errorEl = document.getElementById('category-load-error');
  try {
    const categories = await fetch('/api/categories').then((r) => r.json());
    categoryLabels = Object.fromEntries(categories.map((c) => [c.slug, c.name]));

    const hiddenSelect = document.getElementById('item-category');
    hiddenSelect.innerHTML = categories
      .map((c) => `<option value="${c.slug}">${c.name}</option>`)
      .join('');

    const root = document.querySelector('.custom-select[data-target="item-category"]');
    const menu = root.querySelector('.cs-menu');
    menu.innerHTML = categories
      .map(
        (c, i) => `
          <li class="cs-option flex items-center gap-2 px-2 py-2 rounded-lg cursor-pointer" role="option" data-value="${c.slug}" aria-selected="${i === 0 ? 'true' : 'false'}">
            <span class="cs-option-icon w-5 h-5 shrink-0" style="color:#3F5C46">${categoryIcon(c.slug)}</span>
            <span class="cs-option-label">${c.name}</span>
          </li>
        `
      )
      .join('');

    initCustomSelect(root);
    errorEl.classList.add('hidden');
  } catch (err) {
    errorEl.textContent = '分類載入失敗，請重新整理頁面。';
    errorEl.classList.remove('hidden');
  }
}

async function refreshCharacterDropdowns() {
  const characters = await fetch('/api/characters').then(r => r.json());
  const optionsHtml = characters.length
    ? characters.map(c => `<option value="${c.id}">${c.name}</option>`).join('')
    : '<option value="">尚未新增角色</option>';

  document.getElementById('item-character').innerHTML = optionsHtml;
  document.getElementById('loadout-character').innerHTML = optionsHtml;
}

document.getElementById('character-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const name = document.getElementById('character-name').value;
  await fetch('/api/characters', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name }),
  });
  document.getElementById('character-name').value = '';
  await refreshCharacterDropdowns();
});

document.getElementById('item-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const status = document.getElementById('item-status').value;
  const locationOrBorrower = document.getElementById('item-location-or-borrower').value;
  const body = {
    character_id: Number(document.getElementById('item-character').value),
    name: document.getElementById('item-name').value,
    category: document.getElementById('item-category').value,
    status,
  };
  if (status === 'in_storage') body.location = locationOrBorrower;
  if (status === 'lent_out') body.borrower = locationOrBorrower;

  const res = await fetch('/api/items', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const err = await res.json();
    alert('發生錯誤：' + err.error);
    return;
  }
  document.getElementById('item-name').value = '';
  document.getElementById('item-location-or-borrower').value = '';
});

document.getElementById('search-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const q = document.getElementById('search-q').value;
  const items = await fetch('/api/items?q=' + encodeURIComponent(q)).then(r => r.json());
  renderList('search-results', items, '找不到符合的道具');
});

document.getElementById('loadout-button').addEventListener('click', async () => {
  const characterId = document.getElementById('loadout-character').value;
  if (!characterId) return;
  const items = await fetch(`/api/characters/${characterId}/items`).then(r => r.json());
  renderList('loadout-results', items, '這個角色還沒有登記任何道具');
});

document.getElementById('nav-home').addEventListener('click', (e) => {
  e.preventDefault();
  window.scrollTo({ top: 0, behavior: 'smooth' });
  setActiveNav('nav-home');
});

function setActiveNav(id) {
  document.querySelectorAll('.nav-item').forEach(btn => btn.classList.toggle('is-active', btn.id === id));
}

function renderList(elementId, items, emptyMessage) {
  const list = document.getElementById(elementId);
  if (items.length === 0) {
    list.innerHTML = `<li class="empty text-sm text-center py-3" style="color:#8B8374;border:1px dashed #E4DBC5;border-radius:0.75rem">${emptyMessage}</li>`;
    return;
  }
  list.innerHTML = items.map((item) => itemToLine(item, categoryLabels)).join('');
}

loadCategoryOptions();
refreshCharacterDropdowns();

function renderExportCapture(characters, items) {
  document.getElementById('export-date').textContent = `匯出時間：${new Date().toLocaleString('zh-TW')}`;

  const itemsByCharacter = new Map();
  for (const item of items) {
    if (!itemsByCharacter.has(item.character_id)) itemsByCharacter.set(item.character_id, []);
    itemsByCharacter.get(item.character_id).push(item);
  }

  const groupsHtml = characters
    .map((character) => {
      const characterItems = itemsByCharacter.get(character.id) || [];
      if (characterItems.length === 0) return '';
      return `
        <div style="margin-bottom:20px;">
          <h2 style="font-size:1.1rem;font-weight:700;color:#3F5C46;margin:0 0 8px;padding-bottom:4px;border-bottom:2px solid #E4DBC5;">${character.name}</h2>
          <ul style="list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:6px;">
            ${characterItems.map((item) => itemToLine(item, categoryLabels)).join('')}
          </ul>
        </div>
      `;
    })
    .join('');

  document.getElementById('export-groups').innerHTML =
    groupsHtml || '<p style="text-align:center;color:#8B8374;">尚未登記任何服裝道具</p>';
}

document.getElementById('export-image-button').addEventListener('click', async () => {
  const btn = document.getElementById('export-image-button');
  const originalLabel = btn.textContent;
  btn.disabled = true;
  btn.textContent = '產生圖片中…';
  try {
    const { characters, items } = await fetch('/api/export').then((r) => r.json());
    renderExportCapture(characters, items);
    const canvas = await html2canvas(document.getElementById('export-capture'), {
      backgroundColor: '#FBF8F1',
      scale: 2,
    });
    const link = document.createElement('a');
    link.download = `服裝道具清單-${new Date().toISOString().slice(0, 10)}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch (err) {
    alert('產生圖片失敗，請稍後再試。');
  } finally {
    btn.disabled = false;
    btn.textContent = originalLabel;
  }
});
</script>
</body>
</html>
