<!DOCTYPE html>
<html lang="zh-Hant" data-theme="costume">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>設置 · 服裝道具管家</title>
<link rel="icon" href="assets/app-icon.ico">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body class="bg-base-200 text-base-content font-sans m-0">
<div class="relative max-w-[1080px] mx-auto px-5 py-8 pb-26">

  <header class="text-center mb-8">
    <h1 class="text-2xl font-bold m-0">設置</h1>
    <p class="text-[0.95rem] mt-2" style="color:#8B8374">管理分類：新增、改名、調整順序、刪除。</p>
  </header>

  <section class="card relative bg-base-100 shadow-md p-6 mb-6" style="border:1px solid #E4DBC5;border-radius:1.625rem">
    <h2 class="font-bold text-base-content m-0 mb-4">分類管理</h2>
    <ul id="category-list" class="flex flex-col gap-2 list-none p-0 m-0"></ul>
    <p id="category-error" class="text-sm text-center py-3 mt-3 hidden" style="color:#8B8374;border:1px dashed #E4DBC5;border-radius:0.75rem"></p>
    <form id="category-add-form" class="flex gap-3 mt-4">
      <input type="text" id="category-new-name" placeholder="新增分類名稱" class="input flex-1 h-11 min-h-0" style="background:#F2ECDE;border-color:#E4DBC5">
      <button type="submit" class="btn btn-primary h-11 min-h-0">新增分類</button>
    </form>
  </section>

  <section class="card relative bg-base-100 shadow-md p-6 mb-6" style="border:1px solid #E4DBC5;border-radius:1.625rem">
    <h2 class="font-bold text-base-content m-0 mb-4">角色管理</h2>
    <ul id="character-list" class="flex flex-col gap-2 list-none p-0 m-0"></ul>
    <p id="character-error" class="text-sm text-center py-3 mt-3 hidden" style="color:#8B8374;border:1px dashed #E4DBC5;border-radius:0.75rem"></p>
  </section>

  <section class="card relative bg-base-100 shadow-md p-6" style="border:1px solid #E4DBC5;border-radius:1.625rem">
    <h2 class="font-bold text-base-content m-0 mb-4">隱眼庫存管理</h2>
    <p class="text-sm mb-4" style="color:#8B8374">獨立於角色之外的隱眼款式清單，只記數量，不掛在任何角色底下。新增款式請到首頁「登記服裝道具」，類別選「隱眼」。</p>
    <ul id="lens-list" class="flex flex-col gap-2 list-none p-0 m-0"></ul>
    <p id="lens-error" class="text-sm text-center py-3 mt-3 hidden" style="color:#8B8374;border:1px dashed #E4DBC5;border-radius:0.75rem"></p>
  </section>

</div>

<nav class="fixed left-0 right-0 bottom-0 z-20 flex justify-center gap-8 bg-base-100 px-4 py-2 shadow-[0_-4px_16px_rgba(55,51,44,0.06)]" style="border-top:1px solid #E4DBC5" aria-label="主要導覽">
  <a href="index.html" class="nav-item flex flex-col items-center gap-1 px-3 py-1 text-xs" id="nav-home">
    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11.5 12 4l8 7.5"/><path d="M6 10v9a1 1 0 0 0 1 1h4v-6h2v6h4a1 1 0 0 0 1-1v-9"/></svg>
    <span>首頁</span>
  </a>
  <a href="wardrobe.html" class="nav-item flex flex-col items-center gap-1 px-3 py-1 text-xs" id="nav-wardrobe">
    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v4M8 7h8l3 4v9H5v-9l3-4Z"/><path d="M5 13h14"/></svg>
    <span>我的穿衣櫃</span>
  </a>
  <a href="settings.html" class="nav-item is-active flex flex-col items-center gap-1 px-3 py-1 text-xs" id="nav-settings">
    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 13.5a7.5 7.5 0 0 0 0-3l2-1.5-2-3.5-2.4 1a7.6 7.6 0 0 0-2.6-1.5L14 2h-4l-.4 2.5a7.6 7.6 0 0 0-2.6 1.5l-2.4-1-2 3.5 2 1.5a7.5 7.5 0 0 0 0 3l-2 1.5 2 3.5 2.4-1c.8.65 1.66 1.16 2.6 1.5L10 22h4l.4-2.5c.94-.34 1.8-.85 2.6-1.5l2.4 1 2-3.5-2-1.5Z"/></svg>
    <span>設置</span>
  </a>
</nav>

<style>
  .nav-item.is-active { color: #3F5C46; }
  .nav-item:not(.is-active) { color: #8B8374; }
</style>

<script src="shared.js"></script>
<script>
async function fetchCategories() {
  const res = await fetch('/api/categories');
  if (!res.ok) throw new Error('categories fetch failed');
  return res.json();
}

function renderCategories(categories) {
  const list = document.getElementById('category-list');
  list.innerHTML = categories
    .map(
      (c, i) => `
        <li class="flex items-center justify-between gap-3 px-3 py-2 rounded-xl" style="background:#F2ECDE;border:1px solid #E4DBC5" data-slug="${c.slug}">
          <span class="flex items-center gap-2">
            <span class="w-5 h-5 shrink-0" style="color:#3F5C46">${categoryIcon(c.slug)}</span>
            <span class="category-name">${c.name}</span>
          </span>
          <span class="flex items-center gap-2">
            <button type="button" class="btn-move-up h-8 min-h-0 px-2" ${i === 0 ? 'disabled' : ''} title="上移">↑</button>
            <button type="button" class="btn-move-down h-8 min-h-0 px-2" ${i === categories.length - 1 ? 'disabled' : ''} title="下移">↓</button>
            <button type="button" class="btn-rename h-8 min-h-0 px-2" title="改名">改名</button>
            <button type="button" class="btn-delete h-8 min-h-0 px-2" style="color:#D98A4E" title="刪除">刪除</button>
          </span>
        </li>
      `
    )
    .join('');

  list.querySelectorAll('li').forEach((li) => {
    const slug = li.dataset.slug;

    li.querySelector('.btn-move-up').addEventListener('click', () => moveCategory(slug, 'up'));
    li.querySelector('.btn-move-down').addEventListener('click', () => moveCategory(slug, 'down'));

    li.querySelector('.btn-rename').addEventListener('click', () => {
      const nameEl = li.querySelector('.category-name');
      const currentName = nameEl.textContent;
      nameEl.outerHTML = `<input type="text" class="category-rename-input input h-8 min-h-0" style="background:#F2ECDE;border-color:#E4DBC5">`;
      const input = li.querySelector('.category-rename-input');
      input.value = currentName;
      input.focus();
      input.select();
      let settled = false;
      const commit = () => {
        if (settled) return;
        settled = true;
        renameCategory(slug, input.value);
      };
      const cancel = () => {
        if (settled) return;
        settled = true;
        refreshCategories();
      };
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') commit();
        if (e.key === 'Escape') cancel();
      });
      input.addEventListener('blur', commit);
    });

    li.querySelector('.btn-delete').addEventListener('click', () => deleteCategory(slug));
  });
}

async function refreshCategories() {
  const errorEl = document.getElementById('category-error');
  try {
    const categories = await fetchCategories();
    errorEl.classList.add('hidden');
    renderCategories(categories);
  } catch (err) {
    errorEl.textContent = '資料載入失敗，請重新整理頁面。';
    errorEl.classList.remove('hidden');
  }
}

function showError(message) {
  const errorEl = document.getElementById('category-error');
  errorEl.textContent = message;
  errorEl.classList.remove('hidden');
}

async function moveCategory(slug, direction) {
  const res = await fetch(`/api/categories/${slug}/move`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ direction }),
  });
  if (!res.ok) {
    const err = await res.json();
    showError(err.error);
    return;
  }
  await refreshCategories();
}

async function renameCategory(slug, name) {
  const res = await fetch(`/api/categories/${slug}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name }),
  });
  if (!res.ok) {
    const err = await res.json();
    showError(err.error);
    return;
  }
  await refreshCategories();
}

async function deleteCategory(slug) {
  const res = await fetch(`/api/categories/${slug}`, { method: 'DELETE' });
  if (!res.ok && res.status !== 204) {
    const err = await res.json();
    showError(err.error);
    return;
  }
  await refreshCategories();
}

document.getElementById('category-add-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const input = document.getElementById('category-new-name');
  const name = input.value.trim();
  if (!name) return;
  const res = await fetch('/api/categories', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name }),
  });
  if (!res.ok) {
    const err = await res.json();
    showError(err.error);
    return;
  }
  input.value = '';
  await refreshCategories();
});

async function fetchCharacterList() {
  const res = await fetch('/api/characters');
  if (!res.ok) throw new Error('characters fetch failed');
  return res.json();
}

function renderCharacterList(characters) {
  const list = document.getElementById('character-list');
  if (characters.length === 0) {
    list.innerHTML = '<li class="text-sm text-center py-3" style="color:#8B8374;border:1px dashed #E4DBC5;border-radius:0.75rem">尚未新增角色</li>';
    return;
  }
  list.innerHTML = characters
    .map(
      (c) => `
        <li class="flex items-center justify-between gap-3 px-3 py-2 rounded-xl" style="background:#F2ECDE;border:1px solid #E4DBC5" data-char-id="${c.id}">
          <span class="character-name">${c.name}</span>
          <button type="button" class="btn-delete-character h-8 min-h-0 px-2" style="color:#D98A4E" title="刪除">刪除</button>
        </li>
      `
    )
    .join('');

  list.querySelectorAll('li').forEach((li) => {
    const id = li.dataset.charId;
    const name = li.querySelector('.character-name').textContent;
    li.querySelector('.btn-delete-character').addEventListener('click', () => deleteCharacterRow(id, name));
  });
}

async function refreshCharacterList() {
  const errorEl = document.getElementById('character-error');
  try {
    const characters = await fetchCharacterList();
    errorEl.classList.add('hidden');
    renderCharacterList(characters);
  } catch (err) {
    errorEl.textContent = '資料載入失敗，請重新整理頁面。';
    errorEl.classList.remove('hidden');
  }
}

async function deleteCharacterRow(id, name) {
  if (!window.confirm(`確定要刪除「${name}」嗎？這個角色底下的所有服裝道具也會一起被刪除，此動作無法復原`)) return;
  const res = await fetch(`/api/characters/${id}`, { method: 'DELETE' });
  if (!res.ok && res.status !== 204) {
    const err = await res.json();
    const errorEl = document.getElementById('character-error');
    errorEl.textContent = err.error;
    errorEl.classList.remove('hidden');
    return;
  }
  await refreshCharacterList();
}

async function fetchLensList() {
  const res = await fetch('/api/lenses');
  if (!res.ok) throw new Error('lenses fetch failed');
  return res.json();
}

function renderLensList(lenses) {
  const list = document.getElementById('lens-list');
  if (lenses.length === 0) {
    list.innerHTML = '<li class="text-sm text-center py-3" style="color:#8B8374;border:1px dashed #E4DBC5;border-radius:0.75rem">尚未新增隱眼款式</li>';
    return;
  }
  list.innerHTML = lenses
    .map(
      (lens) => `
        <li class="flex items-center justify-between gap-3 flex-wrap px-3 py-2 rounded-xl" style="background:#F2ECDE;border:1px solid #E4DBC5" data-lens-id="${lens.id}">
          <span class="lens-name font-semibold">${lens.name}</span>
          <span class="flex items-center gap-2">
            <input type="number" class="lens-quantity-input input h-8 min-h-0 w-20" min="0" step="1" value="${lens.quantity}" style="background:#FBF8F1;border-color:#E4DBC5">
            <button type="button" class="btn-save-lens h-8 min-h-0 px-2" style="color:#3F5C46" title="儲存數量">儲存</button>
            <button type="button" class="btn-delete-lens h-8 min-h-0 px-2" style="color:#D98A4E" title="刪除">刪除</button>
          </span>
        </li>
      `
    )
    .join('');

  list.querySelectorAll('li').forEach((li) => {
    const id = li.dataset.lensId;
    const name = li.querySelector('.lens-name').textContent;

    li.querySelector('.btn-save-lens').addEventListener('click', (e) => {
      const quantity = li.querySelector('.lens-quantity-input').value;
      updateLensQuantity(id, quantity, e.currentTarget);
    });

    li.querySelector('.btn-delete-lens').addEventListener('click', () => deleteLensRow(id, name));
  });
}

async function refreshLensList() {
  const errorEl = document.getElementById('lens-error');
  try {
    const lenses = await fetchLensList();
    errorEl.classList.add('hidden');
    renderLensList(lenses);
  } catch (err) {
    errorEl.textContent = '資料載入失敗，請重新整理頁面。';
    errorEl.classList.remove('hidden');
  }
}

function showLensError(message) {
  const errorEl = document.getElementById('lens-error');
  errorEl.textContent = message;
  errorEl.classList.remove('hidden');
}

async function updateLensQuantity(id, quantity, btn) {
  const res = await fetch(`/api/lenses/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ quantity: Number(quantity) }),
  });
  if (!res.ok) {
    const err = await res.json();
    showLensError(err.error);
    return;
  }
  if (btn) {
    btn.textContent = '已儲存';
    btn.disabled = true;
    await new Promise((resolve) => setTimeout(resolve, 700));
  }
  await refreshLensList();
}

async function deleteLensRow(id, name) {
  if (!window.confirm(`確定要刪除「${name}」嗎？此動作無法復原`)) return;
  const res = await fetch(`/api/lenses/${id}`, { method: 'DELETE' });
  if (!res.ok && res.status !== 204) {
    const err = await res.json();
    showLensError(err.error);
    return;
  }
  await refreshLensList();
}

refreshCategories();
refreshCharacterList();
refreshLensList();
</script>
</body>
</html>
